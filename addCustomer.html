<!DOCTYPE html>
<html>
<head>
    <title>Add Customer</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
<div class="container mt-5">
    <h2>Add Customer</h2>

    <div class="card p-4 mt-4">

        <div class="mb-3">
            <label>Customer Name</label>
            <input id="cname" class="form-control" placeholder="Enter customer name">
        </div>

        <div class="mb-3">
            <label>Mobile Number</label>
            <input id="mobile" class="form-control" placeholder="Enter mobile number">
        </div>

        <div class="mb-3">
            <label>Address</label>
            <input id="address" class="form-control" placeholder="Enter address">
        </div>

        <button class="btn btn-primary" onclick="saveCustomer()">Save Customer</button>
        <a href="dashboard.html" class="btn btn-secondary ms-2">Back</a>

        <div id="message" class="mt-3"></div>
    </div>
</div>

<script src="/js/customer.js"></script>
</body>
</html>
