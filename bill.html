<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Bill</title>
    <link rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">🧾 Create New Invoice</h2>

        <!-- CUSTOMER SECTION -->
        <div class="row mb-3">
            <div class="col-md-6">
                <label>Select Customer</label>
                <select id="customerId" class="form-select">
                    <option value="">-- Choose Customer --</option>
                </select>
            </div>
        </div>

        <hr>

        <!-- PRODUCT SECTION -->
        <h4>Add Products</h4>

        <div class="row mb-3">
            <div class="col-md-4">
                <label>Product</label>
                <select id="productId" class="form-select"></select>
            </div>

            <div class="col-md-2">
                <label>Qty</label>
                <input type="number" id="qty" class="form-control" min="1" value="1">
            </div>

            <div class="col-md-2">
                <label>Price</label>
                <input type="text" id="price" class="form-control" disabled>
            </div>

            <div class="col-md-2">
                <label>GST (%)</label>
                <input type="text" id="gst" class="form-control" disabled>
            </div>

            <div class="col-md-2 mt-4">
                <button class="btn btn-success w-100" onclick="addItem()">Add</button>
            </div>
        </div>

        <hr>

        <!-- BILL ITEMS TABLE -->
        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>GST</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="billTable"></tbody>

        </table>

        <h3 class="text-end">Grand Total: ₹ <span id="grandTotal">0</span></h3>

        <div id="message" class="mt-3"></div>

        <button class="btn btn-primary mt-3 w-100" onclick="saveBill()">Save Bill</button>

        <a href="dashboard.html" class="btn btn-secondary mt-2 w-100">Back</a>

    </div>
</div>

<script src="../js/bill.js"></script>
</body>
</html>
