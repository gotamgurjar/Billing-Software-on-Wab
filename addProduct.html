<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
<div class="container mt-5">
    <h2>Add Product</h2>

    <div class="card p-4 mt-4">
        <div class="mb-3">
            <label>Product Name</label>
            <input id="pname" class="form-control" placeholder="Enter product name">
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input id="price" type="number" class="form-control" placeholder="Enter price">
        </div>

        <div class="mb-3">
            <label>GST (%)</label>
            <input id="gst" type="number" class="form-control" placeholder="Enter GST">
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input id="stock" type="number" class="form-control" placeholder="Enter stock">
        </div>

        <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
        <a href="dashboard.html" class="btn btn-secondary ms-2">Back</a>

        <div id="message" class="mt-3"></div>
    </div>
</div>

<script src="/js/product.js"></script>
</body>
</html>
